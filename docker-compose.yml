version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: habit_diary_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: habit_diary
      POSTGRES_USER: habit_user
      POSTGRES_PASSWORD: habit_pass_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - habit_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habit_diary_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: habit_diary
      DB_USER: habit_user
      DB_PASSWORD: habit_pass_2024
      JWT_SECRET: super_secret_jwt_key_habit_diary_2024
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
    ports:
      - '4000:4000'
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - habit_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habit_diary_web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - habit_network

volumes:
  postgres_data:

networks:
  habit_network:
    driver: bridge
